spring.application.name=demo-park-api

## Permite sobrescrever qualquer propriedade via arquivo .env (opcional)
spring.config.import=optional:file:.env[.properties]

## TERMINAL
spring.output.ansi.enabled="ALWAYS"

## LOCALE
spring.web.locale-resolver=fixed
spring.web.locale=pt_BR

# JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=update

# MySQL Database Connection Properties
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/park_api?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=

# JWT
jwt.secret-key=n8Fv3KxPz7LmQ2rT9wYs6HdJ4uBc1EaZ
jwt.expire-days=0
jwt.expire-hours=0
jwt.expire-minutes=30

# Springdoc OpenApi 3.1 & Swagger 3
springdoc.swagger-ui.path=/docs-park.html
springdoc.api-docs.path=/docs-park
springdoc.packagesToScan=com.caiohenrique.demo_park_api.web.controller
